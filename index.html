<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Emergency Volunteer System</title>

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <h1>⚡ Smart Emergency<br>Volunteer System</h1>

    <button class="nav-btn">Dashboard</button>
    <button class="nav-btn">Task Management</button>
    <button class="nav-btn">Volunteer Management</button>
    <button class="nav-btn">AI Matching Engine</button>
    <button class="nav-btn">Activity Log</button>

    <br>

    <button id="toggleEmergencyBtn">🚨 Emergency</button>
    <p>Status: <span id="emergencyStatus">OFF</span></p>

    <select id="themeSelect">
      <option value="aurora">Aurora</option>
      <option value="sunset">Sunset</option>
      <option value="emerald">Emerald</option>
    </select>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main">

    <h2>Dashboard</h2>
    <div id="metricTotalTasks">0</div>
    <div id="metricCompleted">0</div>
    <div id="metricVolunteers">0</div>
    <div id="metricEfficiency">0%</div>

    <hr>

    <!-- TASK SECTION -->
    <h2>Add Task</h2>
    <form id="taskForm">
      <input id="taskTitle" placeholder="Task title" required>
      <input id="taskSkill" placeholder="Skill" required>
      <input id="taskLocation" placeholder="Location" required>

      <select id="taskPriority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>

      <button type="submit">Add Task</button>
    </form>

    <div id="taskList"></div>

    <hr>

    <!-- VOLUNTEER SECTION -->
    <h2>Add Volunteer</h2>
    <form id="volunteerForm">
      <input id="volName" placeholder="Name" required>
      <input id="volSkills" placeholder="Skills" required>
      <input id="volLocation" placeholder="Location" required>
      <input id="volRating" type="number" min="1" max="5" required>

      <button type="submit">Add Volunteer</button>
    </form>

    <div id="volunteerList"></div>

    <hr>

    <!-- AI SECTION -->
    <h2>AI Matching Engine</h2>
    <select id="aiTaskSelect"></select>
    <button id="runAiBtn">Run AI</button>
    <div id="aiResult"></div>

    <hr>

    <!-- ACTIVITY -->
    <h2>Activity Log</h2>
    <div id="activityList"></div>

    <div id="toast"></div>

  </main>

  <!-- JS (VERY IMPORTANT: must be last) -->
  <script src="app.js"></script>

</body>
</html>
