<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Emergency Volunteer System</title>

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>
</head>

<body>

  <!-- INTRO -->
  <div id="introScreen" class="intro-screen">
    <h1>🚨 Smart Emergency Volunteer System</h1>
    <button id="enterAppBtn">Enter</button>
  </div>

  <!-- APP -->
  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2>⚡ Smart System</h2>

      <button class="nav-btn" onclick="showSection('dashboardSection')">Dashboard</button>
      <button class="nav-btn" onclick="showSection('tasksSection')">Tasks</button>
      <button class="nav-btn" onclick="showSection('volunteersSection')">Volunteers</button>
      <button class="nav-btn" onclick="showSection('aiSection')">AI Engine</button>

      <button id="toggleEmergencyBtn">🚨 Emergency</button>
      <p>Status: <span id="emergencyStatus">OFF</span></p>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <!-- DASHBOARD -->
      <section id="dashboardSection" class="section-panel">
        <h2>Dashboard</h2>
        <p>Total Tasks: <span id="metricTotalTasks">0</span></p>
        <p>Completed: <span id="metricCompleted">0</span></p>
        <p>Volunteers: <span id="metricVolunteers">0</span></p>
      </section>

      <!-- TASKS -->
      <section id="tasksSection" class="section-panel">
        <h2>Add Task</h2>

        <form id="taskForm">
          <input id="taskTitle" placeholder="Task Title" required>
          <input id="taskSkill" placeholder="Skill" required>
          <input id="taskLocation" placeholder="Location" required>
          <select id="taskPriority">
            <option value="low">Low</option>
            <option value="high">High</option>
          </select>
          <button type="submit">Add Task</button>
        </form>

        <div id="taskList"></div>
      </section>

      <!-- VOLUNTEERS -->
      <section id="volunteersSection" class="section-panel">
        <h2>Add Volunteer</h2>

        <form id="volunteerForm">
          <input id="volName" placeholder="Name" required>
          <input id="volSkills" placeholder="Skills" required>
          <input id="volLocation" placeholder="Location" required>
          <button type="submit">Add</button>
        </form>

        <div id="volunteerList"></div>
      </section>

      <!-- AI -->
      <section id="aiSection" class="section-panel">
        <h2>AI Engine</h2>
        <select id="aiTaskSelect"></select>
        <button id="runAiBtn">Run AI</button>
        <div id="aiResult"></div>
      </section>

    </main>
  </div>

  <!-- JS -->
  <script src="app.js"></script>

</body>
</html>
